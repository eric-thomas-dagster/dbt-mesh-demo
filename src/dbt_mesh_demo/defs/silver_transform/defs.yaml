type: dbt_mesh_demo.components.dbt_mesh_component.DbtMeshComponent

attributes:
  project: "{{ context.project_root }}/dbt_projects/silver_project"
  auto_partition_microbatch: true
  enable_exposures: true
  enable_source_freshness_policies: true
  exclude: "resource_type:seed"
  translation_settings:
    enable_source_metadata: true
  group_overrides:
    staging: bronze
    silver: silver
