version: 2

groups:
  - name: bronze
    owner:
      name: data-engineering

sources:
  - name: raw_data
    description: "Raw data loaded by upstream ingestion"
    schema: silver
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}
    loaded_at_field: _loaded_at
    tables:
      - name: raw_customers
        identifier: raw_customers
      - name: raw_orders
        identifier: raw_orders
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 12, period: hour}
      - name: raw_products
        identifier: raw_products
      - name: raw_order_items
        identifier: raw_order_items

models:
  - name: stg_customers
    description: "Staged customer data from raw seed"
  - name: stg_orders
    description: "Staged order data from raw seed"
  - name: stg_products
    description: "Staged product data from raw seed"
  - name: stg_order_items
    description: "Staged order items from raw seed"
