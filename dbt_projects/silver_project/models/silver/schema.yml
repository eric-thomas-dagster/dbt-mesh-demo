version: 2

groups:
  - name: silver
    owner:
      name: data-engineering

models:
  - name: customers
    description: "Enriched customer data with order summary metrics"
    access: public
    config:
      group: silver
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: total_orders
        description: "Count of orders placed"
      - name: lifetime_spend
        description: "Total amount spent across all orders"

  - name: orders
    description: "Enriched order data with customer name and line item count"
    access: public
    config:
      group: silver
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: order_items
    description: "Enriched order items with product details and line totals"
    access: public
    config:
      group: silver
    columns:
      - name: order_item_id
        description: "Primary key"
        tests:
          - unique
          - not_null

  - name: orders_daily
    description: "Daily partitioned orders (microbatch)"
    access: public
    config:
      group: silver

unit_tests:
  - name: test_customer_lifetime_spend
    description: "Verify lifetime spend calculation"
    model: customers
    given:
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: '2024-06-01', status: 'completed', amount: 100.00}
          - {order_id: 2, customer_id: 1, order_date: '2024-06-02', status: 'completed', amount: 50.00}
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: 'Alice', last_name: 'Smith', email: 'alice@test.com', created_at: '2024-01-01'}
    expect:
      rows:
        - {customer_id: 1, first_name: 'Alice', last_name: 'Smith', total_orders: 2, lifetime_spend: 150.00}
